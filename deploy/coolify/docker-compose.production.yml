version: '3.8'

# AECMS production Docker Compose for Coolify / self-hosted VPS
# Coolify reads this file and manages the services, networking, and SSL.
# Set environment variables in Coolify's UI under each service.

services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: aecms
      POSTGRES_USER: aecms
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U aecms']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5

  backend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/aecms/backend:latest
    # Or build from source:
    # build:
    #   context: ./backend
    #   target: production
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://aecms:${POSTGRES_PASSWORD}@postgres:5432/aecms
      REDIS_URL: redis://default:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      SETTINGS_KMS_PROVIDER: local
      SETTINGS_ENCRYPTION_KEY: ${SETTINGS_ENCRYPTION_KEY}
      STORAGE_PROVIDER_TYPE: ${STORAGE_PROVIDER_TYPE:-local}
      STORAGE_PATH: /app/uploads
      APP_URL: https://${APP_DOMAIN}
      FRONTEND_URL: https://${APP_DOMAIN}
      API_URL: https://${APP_DOMAIN}
      FRONTEND_ADMIN_URL: https://${APP_DOMAIN}/admin
      EMAIL_PROVIDER_TYPE: ${EMAIL_PROVIDER_TYPE:-smtp}
      JWT_EXPIRATION: 15m
      REFRESH_TOKEN_EXPIRATION: 7d
    volumes:
      - uploads:/app/uploads
    ports:
      - '4000'
    healthcheck:
      test: ['CMD', 'node', '-e', "require('http').get('http://localhost:4000/health',(r)=>{process.exit(r.statusCode===200?0:1)})"]
      interval: 30s
      timeout: 5s
      start_period: 40s

  frontend:
    image: ghcr.io/YOUR_GITHUB_USERNAME/aecms/frontend:latest
    # Or build from source:
    # build:
    #   context: ./frontend
    #   target: production
    #   args:
    #     BACKEND_URL: http://backend:4000
    #     NEXT_PUBLIC_API_URL: https://${APP_DOMAIN}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
      NEXT_PUBLIC_API_URL: https://${APP_DOMAIN}
      NEXT_PUBLIC_BASE_DOMAIN: ${APP_DOMAIN}
    ports:
      - '3000'

volumes:
  postgres_data:
  redis_data:
  uploads:
